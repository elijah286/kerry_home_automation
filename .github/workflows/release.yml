# ---------------------------------------------------------------------------
# CI/CD — Compute version bump, build Docker images, create release on every push to main
#
# Version policy: CI is the SOLE source of version bumps. Every push to main
# results in at least a patch bump. Bump type is determined by conventional
# commit messages since the last release-manifest commit:
#   - `feat!:` or `BREAKING CHANGE:` in footer → MAJOR
#   - `feat:`                                   → MINOR
#   - everything else (fix, chore, docs, ...)   → PATCH  (never zero-bump)
#
# The bumped app-version.json is committed together with deploy/release-manifest.json
# in a single "ci: release vX.Y.Z" commit back to main. The home hub polls origin/main
# and pulls matching pinned images from ghcr.io.
# ---------------------------------------------------------------------------
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_override:
        description: 'Force a specific bump type (major/minor/patch). Empty = auto from commits.'
        type: choice
        default: ''
        options: ['', 'patch', 'minor', 'major']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

# Serialize on main so the version-bump commit can't race against a concurrent run.
# cancel-in-progress: false keeps every push building — we queue them instead of dropping any.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip the workflow's own release commit to avoid an infinite loop.
    if: "!startsWith(github.event.head_commit.message, 'ci: release v')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to find last release commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute bump type and new version
        id: version
        run: |
          set -e
          # Find the last release commit (the one that committed the previous release-manifest)
          LAST_RELEASE_COMMIT=$(git log --format='%H' --grep='^ci: release v' -n 1 || echo "")
          if [ -z "$LAST_RELEASE_COMMIT" ]; then
            # First-ever release — scan from beginning
            RANGE="HEAD"
          else
            RANGE="${LAST_RELEASE_COMMIT}..HEAD"
          fi
          echo "Scanning commits in range: $RANGE"

          # Collect commit subjects + bodies in the range
          COMMITS=$(git log --format='%B%n---END---' "$RANGE" 2>/dev/null || echo "")

          # Determine bump type
          OVERRIDE="${{ inputs.bump_override }}"
          if [ -n "$OVERRIDE" ]; then
            BUMP="$OVERRIDE"
            echo "Using manual override: $BUMP"
          elif echo "$COMMITS" | grep -qE '^(feat|fix|chore|refactor|perf|docs|style|test|build|ci)(\([^)]+\))?!:|BREAKING CHANGE:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Bump type: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          # Read current version
          CUR_MAJOR=$(node -e "console.log(require('./packages/frontend/src/lib/app-version.json').major)")
          CUR_MINOR=$(node -e "console.log(require('./packages/frontend/src/lib/app-version.json').minor)")
          CUR_PATCH=$(node -e "console.log(require('./packages/frontend/src/lib/app-version.json').patch)")

          # Compute new version
          case "$BUMP" in
            major) NEW_MAJOR=$((CUR_MAJOR+1)); NEW_MINOR=0; NEW_PATCH=0 ;;
            minor) NEW_MAJOR=$CUR_MAJOR;       NEW_MINOR=$((CUR_MINOR+1)); NEW_PATCH=0 ;;
            patch) NEW_MAJOR=$CUR_MAJOR;       NEW_MINOR=$CUR_MINOR;       NEW_PATCH=$((CUR_PATCH+1)) ;;
          esac

          NEW_VERSION="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          echo "Current: ${CUR_MAJOR}.${CUR_MINOR}.${CUR_PATCH} → New: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Write the bumped app-version.json for use in subsequent steps and commit
          node -e "
            const fs = require('fs');
            const p = './packages/frontend/src/lib/app-version.json';
            const v = require(p);
            v.major = ${NEW_MAJOR};
            v.minor = ${NEW_MINOR};
            v.patch = ${NEW_PATCH};
            fs.writeFileSync(p, JSON.stringify(v, null, 2) + '\n');
          "

          # Use the head SHA + short SHA for image labeling (stable across this workflow run).
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -- Backend --
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-backend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-backend:sha-${{ steps.version.outputs.sha_short }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.tag }}
            BUILD_SHA=${{ github.sha }}

      # -- Frontend --
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-frontend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-frontend:sha-${{ steps.version.outputs.sha_short }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            INTERNAL_API_ORIGIN=http://backend:3000
            BUILD_VERSION=${{ steps.version.outputs.tag }}
            BUILD_SHA=${{ github.sha }}

      # -- Roborock Bridge --
      - name: Build and push roborock-bridge
        uses: docker/build-push-action@v6
        with:
          context: ./services/roborock-bridge
          file: services/roborock-bridge/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-roborock-bridge:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-roborock-bridge:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-roborock-bridge:sha-${{ steps.version.outputs.sha_short }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=roborock
          cache-to: type=gha,mode=max,scope=roborock

      # -- Proxy --
      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: proxy/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-proxy:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-proxy:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-proxy:sha-${{ steps.version.outputs.sha_short }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy

      # -- Release manifest --
      - name: Generate release manifest
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          cat > deploy/release-manifest.json << EOF
          {
            "version": "${{ steps.version.outputs.tag }}",
            "sha": "${{ github.sha }}",
            "shaShort": "${{ steps.version.outputs.sha_short }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "bump": "${{ steps.version.outputs.bump }}",
            "images": {
              "backend": "${{ env.REGISTRY }}/${OWNER}/ha-backend:${{ steps.version.outputs.tag }}",
              "frontend": "${{ env.REGISTRY }}/${OWNER}/ha-frontend:${{ steps.version.outputs.tag }}",
              "roborock-bridge": "${{ env.REGISTRY }}/${OWNER}/ha-roborock-bridge:${{ steps.version.outputs.tag }}",
              "proxy": "${{ env.REGISTRY }}/${OWNER}/ha-proxy:${{ steps.version.outputs.tag }}"
            }
          }
          EOF
          cat deploy/release-manifest.json

      # -- Commit version bump + manifest in a single atomic commit --
      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/frontend/src/lib/app-version.json deploy/release-manifest.json
          if git diff --cached --quiet; then
            echo "Nothing to commit — skipping release commit."
            exit 0
          fi
          git commit -m "ci: release ${{ steps.version.outputs.tag }}"
          if ! git pull --rebase origin main; then
            echo "::warning::Rebase conflict during release commit — aborting."
            git rebase --abort || true
            exit 1
          fi
          git push
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" || true

      # -- GitHub Release --
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            **Bump type:** ${{ steps.version.outputs.bump }}

            ## Images
            ```
            ghcr.io/${{ github.repository_owner }}/ha-backend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/ha-frontend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/ha-roborock-bridge:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/ha-proxy:${{ steps.version.outputs.tag }}
            ```
          files: deploy/release-manifest.json
          make_latest: true

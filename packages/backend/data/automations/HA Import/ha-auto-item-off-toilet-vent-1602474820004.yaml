id: ha-auto-item-off-toilet-vent-1602474820004
name: 'auto item off: Toilet Vent '
group: HA Import
description: 'Imported from Home Assistant (id: 1602474820004).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:
  - type: not
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.sexy_time
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.person_in_toilet_room
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: switch.master_bathroom_exhaust_fan
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_off
      deviceId: ''
    deviceId: switch.turn_off

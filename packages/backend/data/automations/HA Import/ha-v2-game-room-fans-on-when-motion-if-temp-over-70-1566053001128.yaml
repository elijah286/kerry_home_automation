id: ha-v2-game-room-fans-on-when-motion-if-temp-over-70-1566053001128
name: 'V2: Game Room: Fans On When Motion if temp over 70'
group: HA Import
description: 'Imported from Home Assistant (id: 1566053001128).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: input_boolean.game_room_motion_detected
    attribute: state
conditions:
  - op: gt
    type: device_state
    value: 70
    deviceId: sensor.home_realfeel_temperature
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.sleepover_party
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.kids_sleeping
    attribute: state
  - type: not
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Critical
          deviceId: input_select.power_saving_mode
          attribute: state
        - op: eq
          type: device_state
          value: Aggressive
          deviceId: input_select.power_saving_mode
          attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: fan.upstairs_fans
    attribute: state
actions:
  - type: device_command
    command:
      type: fan
      speed: high
      action: turn_on
      deviceId: fan.game_room_ceiling_fan
    deviceId: fan.game_room_ceiling_fan

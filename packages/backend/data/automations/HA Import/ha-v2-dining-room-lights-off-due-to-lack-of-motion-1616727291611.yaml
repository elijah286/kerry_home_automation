id: ha-v2-dining-room-lights-off-due-to-lack-of-motion-1616727291611
name: 'V2: Dining Room Lights off due to lack of motion'
group: HA Import
description: 'Imported from Home Assistant (id: 1616727291611).'
enabled: false
mode: single
triggers:
  - to: 'off'
    for: '00:00:10'
    type: device_state
    deviceId: input_boolean.motion_in_dining
    attribute: state
  - cron: '*/5 * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: light.dining_room_chandelier
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.motion_in_dining
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_lights_auto_off
    attribute: state
actions:
  - type: device_command
    command:
      type: light
      action: turn_off
      deviceId: light.dining_room_chandelier
    deviceId: light.dining_room_chandelier

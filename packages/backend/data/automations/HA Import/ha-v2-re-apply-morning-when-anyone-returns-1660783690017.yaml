id: ha-v2-re-apply-morning-when-anyone-returns-1660783690017
name: 'V2: Re-apply morning when anyone returns'
group: HA Import
description: 'Imported from Home Assistant (id: 1660783690017).'
enabled: false
mode: single
triggers:
  - to:
      - 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state

id: ha-flicker-lights-when-person-detected-1761878079871
name: Flicker lights when person detected
group: HA Import
description: 'Imported from Home Assistant (id: 1761878079871).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: binary_sensor.fog_trigger_person_occupancy
    attribute: state
  - type: device_state
    deviceId: input_boolean.motion_detected_on_front_patio
    attribute: state
  - type: device_state
    deviceId: input_boolean.person_in_front_yard
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.driveway_frigate_motion
    attribute: state
conditions:

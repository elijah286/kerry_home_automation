        command:
          type: switch
          action: turn_off
          deviceId: switch.vertical_toggle_control_living_room_v2_2
        deviceId: switch.vertical_toggle_control_living_room_v2_2
      - type: device_command
        command:
          type: cover
          action: open_cover
          deviceId: cover.living_room_blinds
        deviceId: cover.living_room_blinds
    type: condition
    condition:
      type: and
      conditions:
        - type: time_window
          after: '06:00'
          before: '23:59'

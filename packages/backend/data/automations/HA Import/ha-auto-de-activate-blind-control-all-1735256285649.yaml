        deviceId: switch.vertical_toggle_control_levi_s_blinds
      - type: device_command
        command:
          type: cover
          action: open_cover
          deviceId: cover.ashers_bedroom_blind
        deviceId: cover.ashers_bedroom_blind
    type: condition
    condition:
      type: and
      conditions:
        - type: time_window
          after: '06:00'
          before: '23:59'
        - op: eq

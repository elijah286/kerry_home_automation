id: ha-auto-de-activate-blind-control-all-1735256285649
name: 'auto de-activate blind control: all'
group: HA Import
description: 'Imported from Home Assistant (id: 1735256285649).'
enabled: false
mode: single
triggers:
  - cron: '* * * * *'
    type: time
  - to: 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.motion_detected_in_office
    attribute: state
  - type: device_state
    deviceId: weather.home
    attribute: state
conditions:
  - type: not
    condition:
      type: or
      conditions:
        - op: eq
          type: device_state
          value: clear-night
          deviceId: weather.home
          attribute: state
        - op: eq
          type: device_state
          value: sunny
          deviceId: weather.home
          attribute: state

id: ha-v2-hvac-kids-wake-up-sets-upstairs-hvac-to-home-mode-1568219040630
name: 'V2 HVAC: Kids wake up sets upstairs HVAC to home mode'
group: HA Import
description: 'Imported from Home Assistant (id: 1568219040630).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.kids_sleeping
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
  - to: 'off'
    type: device_state
    deviceId: input_boolean.upstairs_vacant
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: 'off'
      deviceId: climate.upstairs
      attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.upstairs_vacant
    attribute: state
actions:
  - type: device_command
    command:
      type: climate
      action: set_preset_mode
      deviceId: climate.upstairs
      preset_mode: home
    deviceId: climate.upstairs

id: ha-dim-levi-s-bedside-light-if-he-s-supposed-to-be-sleeping-1584502399002
name: Dim Levi's bedside light if he's supposed to be sleeping
group: HA Import
description: 'Imported from Home Assistant (id: 1584502399002).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: light.levis_bedside_lamp
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.levi_sleeping
    attribute: state
  - op: gt
    type: device_state
    value: 150
    deviceId: light.levis_bedside_lamp
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: light.levis_bedside_lamp
    attribute: state
actions:
  - type: device_command
    command:
      type: light
      action: turn_on
      deviceId: light.levis_bedside_lamp
      brightness: 200
    deviceId: light.levis_bedside_lamp

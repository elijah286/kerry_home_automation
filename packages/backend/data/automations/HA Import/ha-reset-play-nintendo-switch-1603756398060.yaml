id: ha-reset-play-nintendo-switch-1603756398060
name: Reset Play Nintendo Switch
group: HA Import
description: 'Imported from Home Assistant (id: 1603756398060).'
enabled: false
mode: single
triggers:
  - cron: '* * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.play_nintendo
    attribute: state
actions:
  - type: device_command
    command:
      type: input_boolean
      action: turn_off
      deviceId: ''
    deviceId: input_boolean.turn_off

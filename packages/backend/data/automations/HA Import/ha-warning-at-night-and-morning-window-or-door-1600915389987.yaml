id: ha-warning-at-night-and-morning-window-or-door-1600915389987
name: 'Warning at Night and Morning: Window or Door'
group: HA Import
description: 'Imported from Home Assistant (id: 1600915389987).'
enabled: false
mode: single
triggers:

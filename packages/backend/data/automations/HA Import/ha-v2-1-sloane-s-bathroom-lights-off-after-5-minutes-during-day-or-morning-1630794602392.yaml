id: ha-v2-1-sloane-s-bathroom-lights-off-after-5-minutes-during-day-or-morning-1630794602392
name: 'V2.1: Sloane''s Bathroom Lights Off after 5 minutes during day or morning'
group: HA Import
description: 'Imported from Home Assistant (id: 1630794602392).'
enabled: false
mode: single
triggers:
  - to: 'off'
    for: '00:05:00'
    type: device_state
    deviceId: binary_sensor.upstairs_guest_bathroom_motion_sensor
    attribute: state
  - cron: '*/5 * * * *'
    type: time
conditions:
  - type: not
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Late Evening
          deviceId: input_select.system_mode
          attribute: state
        - op: eq
          type: device_state
          value: Evening
          deviceId: input_select.system_mode
          attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: binary_sensor.upstairs_guest_bathroom_motion_sensor
    attribute: state
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.sloanes_bathroom_shower
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.sloanes_bathroom_vanity_lights
        attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_lights_auto_off
    attribute: state
actions:
  - type: device_command
    command:
      type: light
      action: turn_off
      deviceId: light.sloanes_bathroom_shower
    deviceId: light.sloanes_bathroom_shower

id: ha-goodnight-bedroom-fan
name: 'v2: Goodnight mode turns on bedroom fan'
group: HA Import
description: >-
  Imported from HA (id: 2343245553234). When night mode activates, turn on bedroom fan to 100% if someone is home and
  not in critical power saving.
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.night_mode
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Critical
      deviceId: input_select.power_saving_mode
      attribute: state
actions:
  - type: device_command
    command:
      type: fan
      speed: high
      action: set_speed
      deviceId: fan.master_bedroom_ceiling_fan
    deviceId: fan.master_bedroom_ceiling_fan

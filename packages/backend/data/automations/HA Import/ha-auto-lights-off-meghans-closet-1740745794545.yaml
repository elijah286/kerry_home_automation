          type: device_state
          value: 'on'
          deviceId: switch.master_bathroom_meghans_closet
          attribute: state
  - then:
      - type: device_command
        command:
          type: switch
          action: turn_off
          deviceId: switch.master_bathroom_meghans_closet
        deviceId: switch.master_bathroom_meghans_closet
    type: condition
    condition:
      type: and
      conditions:
        - type: not

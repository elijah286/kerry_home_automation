    attribute: state
actions:
  - then:
      - type: device_command
        command:
          type: switch
          action: turn_off
          deviceId: switch.master_bathroom_meghans_closet
        deviceId: switch.master_bathroom_meghans_closet
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.person_in_main_bathroom
          attribute: state
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state

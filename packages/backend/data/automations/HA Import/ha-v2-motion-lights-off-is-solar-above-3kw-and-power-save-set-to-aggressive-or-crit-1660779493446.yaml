id: ha-v2-motion-lights-off-is-solar-above-3kw-and-power-save-set-to-aggressive-or-crit-1660779493446
name: 'V2: Motion lights off is solar above 3kW and power save set to aggressive or critical'
group: HA Import
description: 'Imported from Home Assistant (id: 1660779493446).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: sensor.apf_generation_entity
    attribute: state
conditions:
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: Aggressive
        deviceId: input_select.power_saving_mode
        attribute: state
      - op: eq
        type: device_state
        value: Critical
        deviceId: input_select.power_saving_mode
        attribute: state
actions:
  - type: device_command
    command:
      type: input_boolean
      action: turn_off
      deviceId: input_boolean.motion_lights_on
    deviceId: input_boolean.motion_lights_on

id: ha-v2-asher-s-overhead-light-timer-when-sleeping-1662605115595
name: 'V2: Asher''s Overhead Light Timer when sleeping'
group: HA Import
description: 'Imported from Home Assistant (id: 1662605115595).'
enabled: false
mode: single
triggers:
  - to: 'on'
    for: '00:10:00'
    type: device_state
    deviceId: switch.ashers_bedroom_main_lights
    attribute: state
conditions:

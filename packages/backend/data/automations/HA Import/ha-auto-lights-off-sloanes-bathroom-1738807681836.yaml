id: ha-auto-lights-off-sloanes-bathroom-1738807681836
name: 'auto lights off: sloanes bathroom'
group: HA Import
description: 'Imported from Home Assistant (id: 1738807681836).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.person_in_sloanes_bathroom
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_lights_on
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_lights_auto_off
    attribute: state
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.sloanes_bathroom_vanity_lights
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: switch.sloanes_bathroom_shower
        attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.person_in_sloanes_bathroom
    attribute: state
actions:
  - then:
      - type: device_command
        command:
          type: switch
          action: turn_off
          deviceId: switch.sloanes_bathroom_shower
        deviceId: switch.sloanes_bathroom_shower
      - type: device_command
        command:
          type: light
          action: turn_off
          deviceId: light.sloanes_bathroom_vanity_lights
        deviceId: light.sloanes_bathroom_vanity_lights
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.person_in_sloanes_bathroom
          attribute: state
        - type: or
          conditions:
            - op: eq
              type: device_state
              value: 'on'
              deviceId: light.sloanes_bathroom_vanity_lights
              attribute: state
            - op: eq
              type: device_state
              value: 'on'
              deviceId: switch.sloanes_bathroom_shower
              attribute: state

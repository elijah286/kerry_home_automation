id: ha-mode-change-morning-1720785043000
name: 'Mode change: Morning'
group: HA Import
description: 'Imported from Home Assistant (id: 1720785043000).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: switch.kitchen_under_cabinet
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: light.master_bedroom_meghans_lamp
    attribute: state
  - type: device_state
    deviceId: input_button.wake_levi
    attribute: state
  - type: sun
    event: sunrise
  - to: 'off'
    type: device_state
    deviceId: input_boolean.kids_sleeping
    attribute: state
conditions:
  - type: time_window
    after: '05:00'
    before: '09:00'
  - op: eq
    type: device_state
    value: Night
    deviceId: input_select.system_mode
    attribute: state
actions:
  - type: device_command
    command:
      type: input_button
      action: press
      deviceId: input_button.morning_mode
    deviceId: input_button.morning_mode

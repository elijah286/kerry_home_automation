id: ha-reminder-that-vacation-mode-is-on-1565228348970
name: Reminder that vacation mode is on
group: HA Import
description: 'Imported from Home Assistant (id: 1565228348970).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.night_mode
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.vacation_mode
    attribute: state
actions:
  - type: device_command
    command:
      type: notify
      action: everyone
      message: 'Reminder: vacation mode is still on. Automatic morning routines will NOT run'
      deviceId: ''
    deviceId: notify.everyone

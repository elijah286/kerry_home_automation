id: ha-warning-at-night-and-morning-garage-door-1600915358149
name: 'Warning at Night and Morning: Garage Door'
group: HA Import
description: 'Imported from Home Assistant (id: 1600915358149).'
enabled: false
mode: single
triggers:
  - to: Night
    type: device_state
    deviceId: input_select.system_mode
    attribute: state
  - to: Morning
    type: device_state
    deviceId: input_select.system_mode
    attribute: state
  - to: 'off'
    for: '00:10:00'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.garage_warning
    attribute: state
  - op: eq
    type: device_state
    value: Night
    deviceId: input_select.system_mode
    attribute: state
actions:
  - type: device_command
    command:
      type: notify
      action: everyone
      message: 'Warning: garage door left open'
      deviceId: ''
    deviceId: notify.everyone
  - type: device_command
    command:
      type: switch
      action: turn_on
      deviceId: ''
    deviceId: switch.turn_on

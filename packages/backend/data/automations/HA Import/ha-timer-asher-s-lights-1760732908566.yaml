id: ha-timer-asher-s-lights-1760732908566
name: 'Timer: Asher''s Lights'
group: HA Import
description: 'Imported from Home Assistant (id: 1760732908566).'
enabled: false
mode: single
triggers:
  - cron: '*/1 * * * *'
    type: time
  - type: device_state
    deviceId: light.asher_s_lights
    attribute: state
  - type: device_state
    deviceId: input_select.system_mode
    attribute: state
conditions:
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: 'on'
        deviceId: switch.ashers_bedroom_main_lights
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: switch.ashers_bedroom_closet_light
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.ashers_bedroom_table_lamp
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.ashers_bedroom_desk_lamp
        attribute: state
actions:
  - else:
      - then:
          - type: device_command
            command:
              type: light
              action: turn_off
              deviceId: light.ashers_bedroom_main_lights
            deviceId: light.ashers_bedroom_main_lights
        type: condition
        condition:
          op: eq
          type: device_state
          value: 'on'
          deviceId: light.ashers_bedroom_main_lights
          attribute: state
      - then:
          - type: device_command
            command:
              type: light
              action: turn_off
              deviceId: light.ashers_bedroom_closet_light
            deviceId: light.ashers_bedroom_closet_light
        type: condition
        condition:
          op: eq
          type: device_state
          value: 'on'
          deviceId: light.ashers_bedroom_closet_light
          attribute: state
    then:
      - type: device_command
        command:
          type: light
          action: turn_off
          deviceId: light.asher_s_lights
        deviceId: light.asher_s_lights
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: 'on'
          deviceId: input_boolean.upstairs_vacant
          attribute: state
        - op: eq
          type: device_state
          value: 'on'
          deviceId: light.asher_s_lights
          attribute: state

    deviceId: input_select.system_mode
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: switch.kitchen_under_cabinet
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.bedroom_is_awake
    attribute: state
conditions:

id: ha-v2-mode-morning-when-first-person-gets-up-after-5-30-1564743857321
name: 'v2 :Mode: morning when first person gets up after 5:30'
group: HA Import
description: 'Imported from Home Assistant (id: 1564743857321).'
enabled: false
mode: single
triggers:

id: ha-auto-blinds-open-levi-1737901922100
name: 'auto blinds open: Levi '
group: HA Import
description: 'Imported from Home Assistant (id: 1737901922100).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: input_boolean.upstairs_occupied
    attribute: state
  - type: device_state
    deviceId: input_button.day_mode
    attribute: state
  - type: sun
    event: sunrise
  - to: 'off'
    type: device_state
    deviceId: switch.vertical_toggle_control_levi_s_blinds
    attribute: state
  - to: 'off'
    type: device_state
    deviceId: input_boolean.levi_sleeping
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.upstairs_occupied
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state
  - type: time_window
    after: '06:00'
    before: '23:59'
  - op: eq
    type: device_state
    value: 'off'
    deviceId: switch.vertical_toggle_control_levi_s_blinds
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.levi_sleeping
    attribute: state
actions:
  - type: device_command
    command:
      type: cover
      action: open_cover
      deviceId: cover.levis_bedroom_blind
    deviceId: cover.levis_bedroom_blind

id: ha-v2-boys-bathroom-shower-and-toilet-timer-at-night-1671415033770
name: 'v2: boys bathroom shower and toilet timer at night'
group: HA Import
description: 'Imported from Home Assistant (id: 1671415033770).'
enabled: false
mode: single
triggers:

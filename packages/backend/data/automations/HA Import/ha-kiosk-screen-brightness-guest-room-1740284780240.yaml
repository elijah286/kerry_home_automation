id: ha-kiosk-screen-brightness-guest-room-1740284780240
name: 'Kiosk Screen Brightness: Guest Room'
group: HA Import
description: 'Imported from Home Assistant (id: 1740284780240).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: media_player.elis_office_monitor
    attribute: state
  - cron: '*/5 * * * *'
    type: time
actions:
  - else:
      - type: device_command
        command:
          type: number
          value: '255'
          action: set_value
          deviceId: number.guest_room_kiosk_screen_brightness
        deviceId: number.guest_room_kiosk_screen_brightness
    then:
      - else:
          - type: device_command
            command:
              type: number
              value: '100'
              action: set_value
              deviceId: number.guest_room_kiosk_screen_brightness
            deviceId: number.guest_room_kiosk_screen_brightness
        then:
          - type: device_command
            command:
              type: number
              value: '1'
              action: set_value
              deviceId: number.guest_room_kiosk_screen_brightness
            deviceId: number.guest_room_kiosk_screen_brightness
        type: condition
        condition:
          type: and
          conditions:
            - op: eq
              type: device_state
              value: 'off'
              deviceId: media_player.elis_office_monitor
              attribute: state
            - op: eq
              type: device_state
              value: 'off'
              deviceId: light.guest_room_desk
              attribute: state
            - op: eq
              type: device_state
              value: 'off'
              deviceId: light.guest_room_sconces
              attribute: state
            - op: eq
              type: device_state
              value: 'off'
              deviceId: switch.guest_room_ceiling_fan_light
              attribute: state
    type: condition
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state

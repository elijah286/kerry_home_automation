    condition:
      op: eq
      type: device_state
      value: http://192.168.68.203:8123/lovelace/v2?kiosk
      deviceId: sensor.guest_room_kiosk_current_page
      attribute: state
actions:
  - type: device_command
    command:
      type: button
      action: press
      deviceId: button.guest_room_kiosk_load_start_url
    deviceId: button.guest_room_kiosk_load_start_url

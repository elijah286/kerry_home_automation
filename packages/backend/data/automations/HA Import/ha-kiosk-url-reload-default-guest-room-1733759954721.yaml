id: ha-kiosk-url-reload-default-guest-room-1733759954721
name: 'Kiosk URL reload default: Guest Room'
group: HA Import
description: 'Imported from Home Assistant (id: 1733759954721).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.person_in_guest_room
    attribute: state
  - type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
  - to:
      - 'on'
    type: device_state
    deviceId: input_boolean.show_doorbell_camera
    attribute: state
conditions:

id: ha-v2-lamp-10-min-timer-at-night-levi-s-bedside-1662518700755
name: 'V2: Lamp 10 min Timer at Night. Levi''s Bedside'
group: HA Import
description: 'Imported from Home Assistant (id: 1662518700755).'

id: ha-v2-fireplace-on-when-temp-drops-below-50-1564318155361
name: 'V2: Fireplace on when temp drops below 50'
group: HA Import
description: 'Imported from Home Assistant (id: 1564318155361).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.morning_mode
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
  - type: device_state
    deviceId: input_button.evening_mode
    attribute: state
  - type: device_state
    deviceId: input_button.late_evening_mode
    attribute: state
  - type: device_state
    deviceId: sensor.home_realfeel_temperature
    attribute: state
  - from: '0'
    type: device_state
    deviceId: sensor.living_room_frigate_person_count
    attribute: state
  - to:
      - 'on'
    type: device_state
    deviceId: input_boolean.living_room_motion_detected
    attribute: state
conditions:
  - op: lt
    type: device_state
    value: 50
    deviceId: sensor.home_realfeel_temperature
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: switch.fireplace
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.living_room_motion_detected
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_on
      deviceId: switch.fireplace
    deviceId: switch.fireplace

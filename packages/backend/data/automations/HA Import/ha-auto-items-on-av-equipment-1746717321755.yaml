id: ha-auto-items-on-av-equipment-1746717321755
name: 'Auto items on: AV Equipment'
group: HA Import
description: 'Imported from Home Assistant (id: 1746717321755).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.morning_mode
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
conditions:
  - type: not
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
actions:
  - type: device_command
    command:
      type: media_player
      action: turn_on
      deviceId: media_player.backyard_receiver
    deviceId: media_player.backyard_receiver

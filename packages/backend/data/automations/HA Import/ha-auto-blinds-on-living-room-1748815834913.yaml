id: ha-auto-blinds-on-living-room-1748815834913
name: 'Auto blinds on: living room'
group: HA Import
description: 'Imported from Home Assistant (id: 1748815834913).'
enabled: false
mode: single
triggers:
  - to:
      - 'off'
    for: '00:01:00'
    type: device_state
    deviceId: input_boolean.living_room_motion_detected
    attribute: state
  - type: device_state
    deviceId: weather.home
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.vertical_sun_infront_living_room_v2_2
    attribute: state
conditions:
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: sunny
        deviceId: weather.home
        attribute: state
      - op: eq
        type: device_state
        value: clear-night
        deviceId: weather.home
        attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.living_room_motion_detected
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: switch.vertical_toggle_control_living_room_v2_2
    attribute: state
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: 'off'
        deviceId: binary_sensor.vertical_manual_override_living_room_v2_2
        attribute: state
      - op: eq
        type: device_state
        value: 'off'
        deviceId: input_boolean.living_room_motion_detected
        attribute: state
  - op: gt
    type: device_state
    value: 50
    deviceId: sensor.home_realfeel_temperature
    attribute: state
actions:
  - type: device_command
    command:
      type: button
      action: press
      deviceId: button.vertical_reset_manual_override_living_room
    deviceId: button.vertical_reset_manual_override_living_room

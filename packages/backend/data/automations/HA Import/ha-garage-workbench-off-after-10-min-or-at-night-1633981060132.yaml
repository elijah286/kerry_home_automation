id: ha-garage-workbench-off-after-10-min-or-at-night-1633981060132
name: Garage Workbench Off after 10 min or at night
group: HA Import
description: 'Imported from Home Assistant (id: 1633981060132).'
enabled: false
mode: single
triggers:
  - to: 'off'
    for: '00:10:00'
    type: device_state
    deviceId: input_boolean.motion_in_garage
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.night_mode
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.power_saver
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: switch.garage_workbench
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_off
      deviceId: switch.garage_workbench
    deviceId: switch.garage_workbench

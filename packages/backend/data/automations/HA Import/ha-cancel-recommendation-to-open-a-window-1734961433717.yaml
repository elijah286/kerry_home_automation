id: ha-cancel-recommendation-to-open-a-window-1734961433717
name: Cancel recommendation to open a window
group: HA Import
description: 'Imported from Home Assistant (id: 1734961433717).'
enabled: false
mode: single
triggers:
  - cron: '* * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.recommend_opening_window
    attribute: state
  - op: gt
    type: device_state
    value: 74
    deviceId: sensor.home_realfeel_temperature
    attribute: state
actions:
  - type: device_command
    command:
      type: input_boolean
      action: turn_off
      deviceId: input_boolean.recommend_opening_window
    deviceId: input_boolean.recommend_opening_window

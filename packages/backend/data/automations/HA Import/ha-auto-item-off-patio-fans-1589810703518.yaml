id: ha-auto-item-off-patio-fans-1589810703518
name: 'Auto item off: patio fans'
group: HA Import
description: 'Imported from Home Assistant (id: 1589810703518).'
enabled: false
mode: single
triggers:
  - cron: '*/1 * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: fan.patio_fans
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.motion_detected_on_back_porch
    attribute: state
actions:
  - type: device_command
    command:
      type: fan
      action: turn_off
      deviceId: ''
    deviceId: fan.turn_off
  - type: device_command
    command:
      type: notify
      action: everyone
      message: Outdoor fans have been turned off due to lack of motion
      deviceId: ''
    deviceId: notify.everyone

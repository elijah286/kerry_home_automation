id: ha-jack-and-sally-spotlights-off-with-sconces-1697027256781
name: Jack and sally spotlights off with sconces
group: HA Import
description: 'Imported from Home Assistant (id: 1697027256781).'
enabled: false
mode: single
triggers:
  - to: 'off'
    for: '00:05:00'
    type: device_state
    deviceId: switch.exterior_sconces
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: 'on'
        deviceId: switch.jack_spotlight
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: switch.sally_light
        attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: switch.exterior_sconces
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_off
      deviceId: switch.jack_spotlight
    deviceId: switch.jack_spotlight

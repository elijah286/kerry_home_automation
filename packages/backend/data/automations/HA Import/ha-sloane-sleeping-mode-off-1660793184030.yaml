id: ha-sloane-sleeping-mode-off-1660793184030
name: 'Sloane Sleeping Mode: Off'
group: HA Import
description: 'Imported from Home Assistant (id: 1660793184030).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: light.sloanes_bedroom_dresser_lamp
    attribute: state
  - to:
      - 'on'
    type: device_state
    deviceId: light.sloanes_bedroom_bedside_lamp
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: switch.sloanes_bedroom_closet_light
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: switch.sloanes_bedroom_ceiling_fan_light
    attribute: state
  - to: 'off'
    type: device_state
    deviceId: input_boolean.upstairs_occupied
    attribute: state
  - type: device_state
    deviceId: input_button.day_mode
    attribute: state
conditions:
  - type: time_window
    after: '05:30'
    before: '10:00'
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.sloane_sleeping
    attribute: state
actions:
  - type: device_command
    command:
      type: input_boolean
      action: turn_off
      deviceId: input_boolean.sloane_sleeping
    deviceId: input_boolean.sloane_sleeping

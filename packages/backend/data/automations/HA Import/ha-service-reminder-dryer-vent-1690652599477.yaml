id: ha-service-reminder-dryer-vent-1690652599477
name: 'Service Reminder: Dryer Vent'
group: HA Import
description: 'Imported from Home Assistant (id: 1690652599477).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: sensor.dryer_vent_service_days_left
    attribute: state
  - cron: '* */12 * * *'
    type: time
conditions:
  - op: lt
    type: device_state
    value: 1
    deviceId: sensor.dryer_vent_service_days_left
    attribute: state
actions:
  - type: device_command
    command:
      type: input_boolean
      action: turn_on
      deviceId: input_boolean.dryer_vent_needs_service
    deviceId: input_boolean.dryer_vent_needs_service
  - type: device_command
    command:
      type: notify
      action: everyone
      message: Dryer vent needs to be cleaned
      deviceId: ''
    deviceId: notify.everyone
  - type: device_command
    command:
      type: persistent_notification
      action: create
      message: The dryer is due for for regular service
      deviceId: ''
    deviceId: persistent_notification.create

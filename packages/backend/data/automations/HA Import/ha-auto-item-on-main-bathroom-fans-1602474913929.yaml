id: ha-auto-item-on-main-bathroom-fans-1602474913929
name: 'auto item on: main bathroom fans'
group: HA Import
description: 'Imported from Home Assistant (id: 1602474913929).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: input_boolean.person_in_main_bathroom
    attribute: state
  - type: device_state
    deviceId: input_button.night_mode
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.person_in_toilet_room
    attribute: state
conditions:
  - type: not
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Critical
          deviceId: input_select.power_saving_mode
          attribute: state
        - op: eq
          type: device_state
          value: Aggressive
          deviceId: input_select.power_saving_mode
          attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_on
      deviceId: switch.master_bathroom_exhaust_fan
    deviceId: switch.master_bathroom_exhaust_fan

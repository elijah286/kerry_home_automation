id: ha-auto-blinds-close-upstairs-1735252595837
name: 'auto blinds close: upstairs'
group: HA Import
description: 'Imported from Home Assistant (id: 1735252595837).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.upstairs_occupied
    attribute: state
  - to: Critical
    type: device_state
    deviceId: input_select.power_saving_mode
    attribute: state
  - type: sun
    event: sunset
    offset: '00:30:00'
  - cron: '*/5 * * * *'
    type: time
  - to: 'off'
    type: device_state
    deviceId: binary_sensor.levis_room
    attribute: state

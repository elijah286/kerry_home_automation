    deviceId: input_select.system_mode
    attribute: state
conditions:
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: Critical
        deviceId: input_select.power_saving_mode
        attribute: state
      - op: eq
        type: device_state
        value: 'off'
        deviceId: input_boolean.upstairs_occupied
        attribute: state
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: open
        deviceId: cover.ashers_bedroom_blind
        attribute: state
      - op: eq
        type: device_state
        value: open
        deviceId: cover.levis_bedroom_blind
        attribute: state
      - op: eq
        type: device_state
        value: open
        deviceId: cover.sloanes_bedroom_blind
        attribute: state
      - op: eq
        type: device_state
        value: open
        deviceId: cover.game_room_blinds
        attribute: state
      - op: eq
        type: device_state
        value: open
        deviceId: cover.movie_room_blind
        attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_off
      deviceId: switch.vertical_toggle_control_ashers_blinds
    deviceId: switch.vertical_toggle_control_ashers_blinds
  - else:
      - type: device_command
        command:
          type: persistent_notification
          action: create
          message: Levi's window left open
          deviceId: ''
        deviceId: persistent_notification.create
    then:
      - type: device_command
        command:
          type: cover
          action: close_cover
          deviceId: cover.levis_bedroom_blind
        deviceId: cover.levis_bedroom_blind
      - type: device_command
        command:
          type: persistent_notification
          action: dismiss
          deviceId: ''
        deviceId: persistent_notification.dismiss
    type: condition
    condition:

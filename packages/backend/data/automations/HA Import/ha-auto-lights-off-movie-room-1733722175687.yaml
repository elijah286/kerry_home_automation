    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_lights_auto_off
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.person_in_movie_room
    attribute: state
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.theater_floor_lamp
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: light.movie_room_main_lights
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: switch.movie_room_ceiling_fan_light
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: fan.movie_room_ceiling_fan
        attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.game_room_motion_detected
    attribute: state
actions:
  - then:
      - type: device_command
        command:
          type: light
          action: turn_off
          deviceId: light.theater_floor_lamp
        deviceId: light.theater_floor_lamp
      - type: device_command
        command:
          type: switch
          action: turn_off
          deviceId: switch.movie_room_ceiling_fan_light
        deviceId: switch.movie_room_ceiling_fan_light
    type: condition
    condition:
      op: eq
      type: device_state
      value: 'on'
      deviceId: input_boolean.upstairs_vacant
      attribute: state
  - then:

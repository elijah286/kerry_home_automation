        command:
          type: light
          action: turn_off
          deviceId: light.theater_floor_lamp
        deviceId: light.theater_floor_lamp
      - type: device_command
        command:
          type: switch
          action: turn_off
          deviceId: switch.movie_room_ceiling_fan_light
        deviceId: switch.movie_room_ceiling_fan_light
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state
        - op: eq
          type: device_state
          value: 'off'
          deviceId: media_player.movie_room_tv
          attribute: state
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.party_mode
          attribute: state
        - type: or
          conditions:
            - op: eq
              type: device_state
              value: 'off'
              deviceId: media_player.movie_left_tv
              attribute: state
            - op: eq
              type: device_state
              value: unavailable
              deviceId: media_player.movie_left_tv
              attribute: state
        - type: or
          conditions:
            - op: eq
              type: device_state
              value: 'off'
              deviceId: media_player.movie_room_right_screen
              attribute: state
            - op: eq
              type: device_state
              value: standby
              deviceId: media_player.movie_room_right_screen
              attribute: state
            - op: eq
              type: device_state
              value: unavailable
              deviceId: media_player.movie_room_right_screen
              attribute: state
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.person_in_movie_room
          attribute: state
  - then:
      - type: device_command
        command:
          type: light
          action: turn_off
          deviceId: light.theater_floor_lamp
        deviceId: light.theater_floor_lamp
      - type: device_command
        command:
          type: switch
          action: turn_off
          deviceId: switch.movie_room_ceiling_fan_light
        deviceId: switch.movie_room_ceiling_fan_light
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: 'off'
          deviceId: media_player.movie_room_tv
          attribute: state
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.party_mode
          attribute: state
        - type: or
          conditions:
            - op: eq
              type: device_state
              value: 'off'
              deviceId: media_player.movie_left_tv
              attribute: state
            - op: eq
              type: device_state
              value: unavailable
              deviceId: media_player.movie_left_tv
              attribute: state
        - type: or
          conditions:
            - op: eq
              type: device_state
              value: 'off'
              deviceId: media_player.movie_room_right_screen
              attribute: state
            - op: eq
              type: device_state
              value: standby
              deviceId: media_player.movie_room_right_screen
              attribute: state
            - op: eq
              type: device_state
              value: unavailable
              deviceId: media_player.movie_room_right_screen
              attribute: state
        - op: eq

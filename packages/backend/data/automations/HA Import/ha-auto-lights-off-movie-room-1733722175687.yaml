id: ha-auto-lights-off-movie-room-1733722175687
name: 'auto lights off: movie room'
group: HA Import
description: 'Imported from Home Assistant (id: 1733722175687).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.person_in_movie_room
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:

id: ha-person-clear-pool-1734821600322
name: 'Person clear: pool'
group: HA Import
description: 'Imported from Home Assistant (id: 1734821600322).'
enabled: false
mode: single
triggers:
  - cron: '* * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.person_in_pool
    attribute: state
  - type: or
    conditions:
      - type: and
        conditions:
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.pool_person_detected
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: input_boolean.motion_detected_on_back_porch
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.backyard_frigate_person_occupancy
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.spa_person_occupancy
            attribute: state
          - type: time_window
            after: '23:30'
            before: '05:00'
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.pool_water_person_occupancy
            attribute: state
      - type: and
        conditions:
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.backyard_frigate_person_occupancy
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.pool_person_detected
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: input_boolean.motion_detected_on_back_porch
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.spa_person_occupancy
            attribute: state
          - op: eq
            type: device_state
            value: 'off'
            deviceId: binary_sensor.pool_water_person_occupancy
            attribute: state
actions:
  - type: device_command
    command:
      type: input_boolean
      action: turn_off
      deviceId: input_boolean.person_in_pool
    deviceId: input_boolean.person_in_pool

id: ha-auto-lights-off-hallway-1734834875858
name: 'Auto lights off: hallway'
group: HA Import
description: 'Imported from Home Assistant (id: 1734834875858).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: input_boolean.person_in_hallway
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: input_boolean.motion_lights_auto_off
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.person_in_hallway
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_lights_auto_off
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: light.hallway_main_lights
    attribute: state
actions:
  - then:
      - type: device_command
        command:
          type: light
          action: turn_off
          deviceId: light.hallway_main_lights
        deviceId: light.hallway_main_lights
    type: condition
    condition:
      type: and
      conditions:
        - type: not
          condition:
            op: eq
            type: device_state
            value: Night
            deviceId: input_select.system_mode
            attribute: state
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.person_in_hallway
          attribute: state
  - then:
      - type: device_command
        command:
          type: light
          action: turn_off
          deviceId: light.hallway_main_lights
        deviceId: light.hallway_main_lights
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.person_in_hallway
          attribute: state
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state

id: ha-v2-sloane-bathroom-motion-when-not-sleeping-1630794336008
name: 'V2: sloane Bathroom motion when not sleeping'
group: HA Import
description: 'Imported from Home Assistant (id: 1630794336008).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.upstairs_guest_bathroom_motion_sensor
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.kids_sleeping
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Critical
      deviceId: input_select.power_saving_mode
      attribute: state
actions:
  - type: device_command
    command:
      type: light
      action: turn_on
      deviceId: light.sloanes_bathroom_vanity_lights
      brightness: 255
    deviceId: light.sloanes_bathroom_vanity_lights

id: ha-run-graveyard-animatronic-when-person-detected-1761770513071
name: Run graveyard animatronic when person detected
group: HA Import
description: 'Imported from Home Assistant (id: 1761770513071).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.graveyard_trigger_person_occupancy
    attribute: state
  - to: 'off'
    for: '00:00:06'
    type: device_state
    deviceId: input_boolean.run_jack_and_sally_show
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.halloween_mode
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.run_jack_and_sally_show
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.animatronics_armed
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: binary_sensor.graveyard_trigger_person_occupancy
    attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: switch.animatronic_control
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_on
      deviceId: switch.animatronic_control
    deviceId: switch.animatronic_control

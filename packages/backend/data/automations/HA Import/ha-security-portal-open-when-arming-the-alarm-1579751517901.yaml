id: ha-security-portal-open-when-arming-the-alarm-1579751517901
name: 'SECURITY: Portal open when arming the alarm'
group: HA Import
description: 'Imported from Home Assistant (id: 1579751517901).'
enabled: false
mode: single
triggers:

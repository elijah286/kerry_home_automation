id: ha-auto-blinds-open-office-1737900839574
name: 'auto blinds open: office'
group: HA Import
description: 'Imported from Home Assistant (id: 1737900839574).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.day_mode
    attribute: state
  - type: sun
    event: sunrise
  - to: 'on'
    type: device_state
    deviceId: input_boolean.motion_detected_in_office
    attribute: state
  - to: 'off'
    type: device_state
    deviceId: switch.vertical_toggle_control_office
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.anyone_home
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Night
      deviceId: input_select.system_mode
      attribute: state
  - type: time_window
    after: '06:00'
    before: '23:59'
  - op: eq
    type: device_state
    value: 'off'
    deviceId: switch.vertical_toggle_control_living_room_v2_2
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.motion_detected_in_office
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: Critical
      deviceId: input_select.power_saving_mode
      attribute: state
actions:
  - type: device_command
    command:
      type: cover
      action: open_cover
      deviceId: cover.office
    deviceId: cover.office

    conditions:
      - op: eq
        type: device_state
        value: 'on'
        deviceId: binary_sensor.driveway_frigate_motion
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: binary_sensor.driveway_frigate_person_occupancy
        attribute: state
      - op: eq
        type: device_state
        value: 'on'
        deviceId: input_boolean.motion_detected_on_front_patio

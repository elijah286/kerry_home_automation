id: ha-v2-night-button-puts-kids-to-sleep-if-sleepover-mode-off-1660748871235
name: V2 Night Button puts kids to sleep if sleepover mode off
group: HA Import
description: 'Imported from Home Assistant (id: 1660748871235).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.night_mode
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.sleepover_party
    attribute: state
actions:
  - type: device_command
    command:
      type: input_button
      action: press
      deviceId: input_button.puts_kids_to_sleep
    deviceId: input_button.puts_kids_to_sleep

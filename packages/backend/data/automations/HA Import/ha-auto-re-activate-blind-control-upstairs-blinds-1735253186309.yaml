id: ha-auto-re-activate-blind-control-upstairs-blinds-1735253186309
name: 'auto re-activate blind control: upstairs blinds'
group: HA Import
description: 'Imported from Home Assistant (id: 1735253186309).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: input_boolean.upstairs_occupied
    attribute: state
  - type: device_state
    deviceId: input_select.power_saving_mode
    attribute: state
  - type: sun
    event: sunrise
  - type: device_state
    deviceId: input_button.day_mode
    attribute: state
conditions:
  - type: not
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Critical
          deviceId: input_select.power_saving_mode
          attribute: state
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state
  - type: time_window
    after: '06:00'
    before: '23:59'
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.upstairs_occupied
    attribute: state
  - type: or
    conditions:
      - op: eq
        type: device_state
        value: clear-night
        deviceId: weather.home
        attribute: state
      - op: eq
        type: device_state
        value: sunny
        deviceId: weather.home
        attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_on
      deviceId: switch.vertical_toggle_control_ashers_blinds
    deviceId: switch.vertical_toggle_control_ashers_blinds

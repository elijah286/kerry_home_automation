id: ha-v2-day-mode-on-turns-off-sloane-s-twinkle-lights-1661002189501
name: 'v2: day mode on turns off Sloane''s twinkle lights'
group: HA Import
description: 'Imported from Home Assistant (id: 1661002189501).'
enabled: false
mode: single
triggers:
  - to: Day
    type: device_state
    deviceId: input_select.system_mode
    attribute: state

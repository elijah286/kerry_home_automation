      - 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_off
      deviceId: switch.sloanes_twinkler_lights
    deviceId: switch.sloanes_twinkler_lights

id: ha-notification-that-someone-is-in-home-while-family-is-away-1735308323384
name: Notification that someone is in home while family is away
group: HA Import
description: 'Imported from Home Assistant (id: 1735308323384).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: input_boolean.anyone_home
    attribute: state
conditions:

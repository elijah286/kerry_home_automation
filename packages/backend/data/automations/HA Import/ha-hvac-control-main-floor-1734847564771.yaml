id: ha-hvac-control-main-floor-1734847564771
name: 'HVAC Control: Main Floor'
group: HA Import
description: 'Imported from Home Assistant (id: 1734847564771).'
enabled: false
mode: restart
triggers:
  - type: device_state
    deviceId: sensor.main_floor_temperature
    attribute: state
  - type: device_state
    deviceId: sensor.home_realfeel_temperature
    attribute: state
  - type: device_state
    deviceId: input_select.system_mode
    attribute: state
  - for: '00:00:10'
    type: device_state
    deviceId: input_number.main_floor_target_temp
    attribute: state
  - from: 'off'
    type: device_state
    deviceId: climate.main_floor
    attribute: state
  - type: device_state
    deviceId: input_select.power_saving_mode
    attribute: state
  - type: device_state
    deviceId: input_boolean.sexy_time
    attribute: state
  - cron: 0 11 * * *
    type: time
  - cron: 0 14 * * *
    type: time
  - cron: 0 1 * * *
    type: time
conditions:
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.sexy_time
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: 'off'
      deviceId: climate.main_floor
      attribute: state
  - op: eq
    type: device_state
    value: 'off'
    deviceId: input_boolean.grid_offline
    attribute: state
actions:
  - else:
      - type: device_command
        command:
          type: input_number
          value: '{{ states(''sensor.main_floor_temperature'')|float }}'
          action: set_value
          deviceId: input_number.measured_temperature_for_main_floor
        deviceId: input_number.measured_temperature_for_main_floor
    then:
      - type: device_command
        command:
          type: input_number
          value: '{{ states(''sensor.main_bedroom_temperature'')|float }}'
          action: set_value
          deviceId: input_number.measured_temperature_for_main_floor
        deviceId: input_number.measured_temperature_for_main_floor
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state
        - type: not
          condition:
            op: eq
            type: device_state
            value: unavailable
            deviceId: sensor.main_bedroom_temperature
            attribute: state
  - else:
      - type: device_command
        command:
          type: climate
          action: set_fan_mode
          deviceId: climate.main_floor
          fan_mode: auto
        deviceId: climate.main_floor
      - type: device_command
        command:
          type: input_boolean
          action: turn_off
          deviceId: input_boolean.hvac_main_floor_fan_on
        deviceId: input_boolean.hvac_main_floor_fan_on
      - type: device_command
        command:
          type: fan
          action: turn_off
          deviceId: fan.living_room_ceiling_fan
        deviceId: fan.living_room_ceiling_fan
    then:
      - type: device_command
        command:
          type: climate
          action: set_fan_mode
          deviceId: climate.main_floor
          fan_mode: 'on'
        deviceId: climate.main_floor
      - type: device_command
        command:
          type: input_boolean
          action: turn_on
          deviceId: input_boolean.hvac_main_floor_fan_on
        deviceId: input_boolean.hvac_main_floor_fan_on
      - type: device_command
        command:
          type: fan
          speed: high
          action: turn_on
          deviceId: fan.living_room_ceiling_fan
        deviceId: fan.living_room_ceiling_fan
    type: condition
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: 'off'
          deviceId: input_boolean.hvac_main_floor_fan_on
          attribute: state
        - op: eq
          type: device_state
          value: 'on'
          deviceId: input_boolean.anyone_home
          attribute: state
        - op: gt
          type: device_state
          value: 50
          deviceId: sensor.home_realfeel_temperature
          attribute: state
  - then:
      - type: device_command
        command:
          type: climate
          action: set_preset_mode
          deviceId: climate.main_floor
          preset_mode: away
        deviceId: climate.main_floor
      - type: device_command
        command:
          type: input_boolean
          action: turn_off
          deviceId: input_boolean.hvac_main_floor_fan_on
        deviceId: input_boolean.hvac_main_floor_fan_on
      - type: log
        message: '[HA unknown action] ["stop"]'
    type: condition
    condition:
      op: eq
      type: device_state
      value: Critical
      deviceId: input_select.power_saving_mode
      attribute: state
  - then:
      - type: device_command
        command:
          type: ecobee
          action: set_sensors_used_in_climate
          deviceId: climate.main_floor
          preset_mode: Home
        deviceId: climate.main_floor
    type: condition
    condition:
      op: eq
      type: device_state
      value: 'on'
      deviceId: input_boolean.sexy_time
      attribute: state
  - then:
      - type: device_command
        command:
          type: input_boolean
          action: turn_on
          deviceId: input_boolean.recommend_opening_window
        deviceId: input_boolean.recommend_opening_window
    type: condition
    condition:
      op: eq
      type: device_state
      value: 'on'
      deviceId: input_boolean.anyone_home
      attribute: state

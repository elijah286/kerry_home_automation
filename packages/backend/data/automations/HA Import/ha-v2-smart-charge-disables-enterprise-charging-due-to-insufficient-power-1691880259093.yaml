id: ha-v2-smart-charge-disables-enterprise-charging-due-to-insufficient-power-1691880259093
name: 'V2: Smart charge disables enterprise charging due to insufficient power'
group: HA Import
description: 'Imported from Home Assistant (id: 1691880259093).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: input_boolean.smart_charge
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.enterprise_charger
    attribute: state
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.enterprise_charging
    attribute: state
  - cron: '* * * * *'
    type: time
  - type: device_state
    deviceId: input_number.minimum_charge_level_for_smartcharge
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.smart_charge
    attribute: state
  - op: eq
    type: device_state
    value: home
    deviceId: device_tracker.enterprise_location_tracker
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: binary_sensor.enterprise_charger
    attribute: state
  - type: not
    condition:
      op: gt
      type: device_state
      value: 0.5
      deviceId: sensor.excess_power
      attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: switch.enterprise_charger
    attribute: state
  - type: not
    condition:
      op: eq
      type: device_state
      value: unavailable
      deviceId: device_tracker.enterprise_location_tracker
      attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: binary_sensor.enterprise_charging
    attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_off
      deviceId: switch.enterprise_charger
    deviceId: switch.enterprise_charger
  - type: device_command
    command:
      type: input_number
      value: 0
      action: set_value
      deviceId: input_number.ev_charging_amp_set_point
    deviceId: input_number.ev_charging_amp_set_point

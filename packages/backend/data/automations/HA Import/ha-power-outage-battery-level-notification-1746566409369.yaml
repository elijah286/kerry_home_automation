id: ha-power-outage-battery-level-notification-1746566409369
name: 'Power outage: battery level notification'
group: HA Import
description: 'Imported from Home Assistant (id: 1746566409369).'
enabled: false
mode: single
triggers:
  - cron: '*/10 * * * *'
    type: time
  - to: 'off'
    for: '00:01:00'
    type: device_state
    deviceId: binary_sensor.home_energy_gateway_grid_status_2
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'off'
    deviceId: binary_sensor.home_energy_gateway_grid_status_2
    attribute: state
  - op: gt
    type: device_state
    value: 30
    deviceId: sensor.home_energy_gateway_battery
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.power_level_verbal_warnings
    attribute: state
actions:
  - type: device_command
    command:
      type: notify
      action: alexa_media
      message: Emergency power at {{ states('sensor.home_energy_gateway_battery') }} percent.
      deviceId: ''
    deviceId: notify.alexa_media
  - type: device_command
    command:
      type: notify
      action: alexa_media
      message: Emergency power at {{ states('sensor.home_energy_gateway_battery') }} percent.
      deviceId: ''
    deviceId: notify.alexa_media

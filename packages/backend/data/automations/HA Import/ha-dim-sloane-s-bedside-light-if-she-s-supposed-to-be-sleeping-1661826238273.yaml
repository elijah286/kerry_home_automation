id: ha-dim-sloane-s-bedside-light-if-she-s-supposed-to-be-sleeping-1661826238273
name: Dim Sloane's bedside light if she's supposed to be sleeping
group: HA Import
description: 'Imported from Home Assistant (id: 1661826238273).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: light.sloanes_bedroom_dresser_lamp
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'on'
    deviceId: input_boolean.sloane_sleeping
    attribute: state
  - op: gt
    type: device_state
    value: 90
    deviceId: light.sloanes_bedroom_dresser_lamp
    attribute: state
  - op: eq
    type: device_state
    value: 'on'
    deviceId: light.sloanes_bedroom_dresser_lamp
    attribute: state
actions:
  - type: device_command
    command:
      type: light
      action: turn_on
      deviceId: light.sloanes_bedroom_dresser_lamp
      brightness: 127
    deviceId: light.sloanes_bedroom_dresser_lamp

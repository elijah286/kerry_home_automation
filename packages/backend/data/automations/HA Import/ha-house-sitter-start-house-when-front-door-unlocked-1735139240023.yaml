id: ha-house-sitter-start-house-when-front-door-unlocked-1735139240023
name: 'House sitter: start house when front door unlocked'
group: HA Import
description: 'Imported from Home Assistant (id: 1735139240023).'
enabled: false
mode: single
triggers:

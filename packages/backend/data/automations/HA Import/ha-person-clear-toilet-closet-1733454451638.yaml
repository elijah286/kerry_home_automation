id: ha-person-clear-toilet-closet-1733454451638
name: 'Person clear: toilet closet'
group: HA Import
description: 'Imported from Home Assistant (id: 1733454451638).'
enabled: false
mode: single
triggers:
  - to: 'off'
    type: device_state
    deviceId: binary_sensor.toilet_closet_motion_detection
    attribute: state
  - cron: '* * * * *'
    type: time
conditions:

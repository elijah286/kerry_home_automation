id: ha-motion-in-boys-bathroom-when-not-night-1630286519258
name: Motion in Boys Bathroom When Not Night
group: HA Import
description: 'Imported from Home Assistant (id: 1630286519258).'
enabled: false
mode: single
triggers:
  - to: 'on'
    type: device_state
    deviceId: binary_sensor.boys_bathroom_motion
    attribute: state
conditions:
  - op: eq
    type: device_state
    value: 'off'
    deviceId: light.boys_bathroom_vanity_lights_new
    attribute: state
  - type: not
    condition:
      type: and
      conditions:
        - op: eq
          type: device_state
          value: Night
          deviceId: input_select.system_mode
          attribute: state
        - op: eq
          type: device_state
          value: 'on'
          deviceId: input_boolean.kids_sleeping
          attribute: state
actions:
  - type: device_command
    command:
      type: switch
      action: turn_on
      deviceId: switch.boys_bathroom_vanity_lights
    deviceId: switch.boys_bathroom_vanity_lights
  - type: device_command
    command:
      type: light
      action: turn_on
      deviceId: light.boys_bathroom_vanity_lights_new
      brightness: 255
    deviceId: light.boys_bathroom_vanity_lights_new

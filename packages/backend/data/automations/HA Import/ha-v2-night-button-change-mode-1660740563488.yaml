id: ha-v2-night-button-change-mode-1660740563488
name: 'V2 Night Button: Change Mode'
group: HA Import
description: 'Imported from Home Assistant (id: 1660740563488).'
enabled: false
mode: single
triggers:
  - type: device_state
    deviceId: input_button.night_mode
    attribute: state
conditions:

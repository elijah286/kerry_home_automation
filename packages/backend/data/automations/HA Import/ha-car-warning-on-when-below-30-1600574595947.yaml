    conditions:
      - op: lt
        type: device_state
        value: 30
        deviceId: sensor.voyager_battery_sensor
        attribute: state
      - op: lt
        type: device_state
        value: 30
        deviceId: sensor.enterprise_battery_sensor
        attribute: state
actions:

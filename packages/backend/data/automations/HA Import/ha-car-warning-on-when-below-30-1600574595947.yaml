    type: device_state
    deviceId: input_select.system_mode
    attribute: state
  - to: home
    type: device_state
    deviceId: device_tracker.enterprise_location_tracker
    attribute: state
  - to: home
    type: device_state
    deviceId: device_tracker.voyager_location_tracker
    attribute: state
conditions:

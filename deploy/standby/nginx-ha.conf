# Install (see scripts/install-standby-nginx.sh):
#   - Port 80 → proxy to HomeOS frontend at 127.0.0.1:3001
#   - If frontend is down: show standby.html (Docker starting, reboot, etc.)
#
# Limitation: while the entire machine is powered off, nothing on this host can respond.

server {
  listen 80 default_server;
  listen [::]:80 default_server;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_intercept_errors on;
    error_page 502 503 504 /standby.html;
  }

  location = /standby.html {
    root /var/www/ha-standby;
    internal;
  }
}

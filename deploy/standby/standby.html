<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="5" />
    <title>HomeOS — Starting</title>
    <style>
      :root {
        --bg: #0a0e14;
        --fg: #c8d0e0;
        --accent: #4a9eff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      .card {
        text-align: center;
        padding: 2rem 2.5rem;
        max-width: 28rem;
        border: 1px solid rgba(74, 158, 255, 0.35);
        border-radius: 8px;
        background: rgba(20, 28, 40, 0.85);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.35rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.06em;
      }
      p {
        margin: 0;
        line-height: 1.55;
        font-size: 0.95rem;
        opacity: 0.92;
      }
      .sub {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>SERVER REBOOTING · STANDBY</h1>
      <p>HomeOS is starting. This page refreshes every few seconds.</p>
      <p class="sub">When the app is ready, you will see the normal UI.</p>
    </div>
  </body>
</html>

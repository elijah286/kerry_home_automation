# Stable project name — avoids duplicate prefixed names (e.g. ec0868360669_...) when
# compose is invoked from different cwd or with varying COMPOSE_PROJECT_NAME.
name: home-automation

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: home_automation
      POSTGRES_USER: ha_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ha_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ha_user -d home_automation"]
      interval: 10s
      timeout: 5s
      retries: 5

  go2rtc:
    # master-hardware variant bundles ffmpeg with Intel QuickSync / VAAPI /
    # NVENC support. Without this, every HLS segment / MJPEG frame would be
    # software-transcoded and peg the CPU (the N100 has a perfectly capable
    # iGPU — we just have to let go2rtc use it).
    image: alexxit/go2rtc:master-hardware
    restart: unless-stopped
    # Pass the Intel iGPU through so ffmpeg inside the container can open the
    # render node. `group_add` gives the container's unprivileged user
    # permission to read /dev/dri/renderD128. Default GIDs match Debian /
    # Ubuntu (render=109, video=44); override via .env if `getent group
    # render` on the host returns something different.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID:-109}"
      - "${VIDEO_GID:-44}"
    volumes:
      - ./services/go2rtc:/config
    expose:
      - "1984"
      - "8554"
      - "8555"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1984/api/streams"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  roborock-bridge:
    image: ${HA_ROBOROCK_IMAGE:-ghcr.io/elijah286/ha-roborock-bridge:latest}
    build:
      context: ./services/roborock-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ROBOROCK_BRIDGE_SECRET: ${ROBOROCK_BRIDGE_SECRET:-change-me-roborock-bridge}
    expose:
      - "8765"
    # Health check is defined in the Dockerfile (curl-based, more reliable than
    # the previous Python one-liner which was fragile and caused false unhealthy).
    # This service is non-critical: the backend starts regardless of its health
    # (depends_on: service_started) and handles bridge failures gracefully.

  zwave-js-ui:
    # Z-Wave JS UI runs the Z-Wave network and exposes a WebSocket server
    # (port 3000 internally) that the backend `zwave` integration connects to.
    # The web UI on 8091 is for pairing devices, viewing logs, and OTA updates.
    #
    # Override ZWAVE_DEVICE on the host (.env) to match the dongle's serial path.
    # AEotec Z-Stick Gen5/7 typically enumerates at /dev/ttyACM0; for stability
    # use /dev/serial/by-id/usb-0658_0200-* via `ls /dev/serial/by-id/`.
    image: zwavejs/zwave-js-ui:latest
    restart: unless-stopped
    tty: true
    stop_signal: SIGINT
    ports:
      - "8091:8091"
    devices:
      - "${ZWAVE_DEVICE:-/dev/ttyACM0}:/dev/zwave"
    environment:
      SESSION_SECRET: ${ZWAVE_SESSION_SECRET:-change-me-zwave-session}
      TZ: ${TZ:-America/New_York}
    volumes:
      - zwave_data:/usr/src/app/store

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${HA_BACKEND_IMAGE:-ghcr.io/elijah286/ha-backend:latest}
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.prod
    # always: come back after daemon reboot even if previously stopped (hub should self-heal)
    restart: always
    ports:
      - "3000:3000"
    # Mount the live git checkout + Docker socket so Settings → Software update can run scripts/update.sh.
    # Set HA_APP_ROOT on the host if the repo is not at /opt/home-automation.
    volumes:
      - ${HA_APP_ROOT:-/opt/home-automation}:/opt/home-automation
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker credentials so deploy.sh (running inside this container) can pull
      # from ghcr.io using the host user's `docker login` session.
      - ${DOCKER_CONFIG:-${HOME}/.docker}:/root/.docker:ro
    env_file:
      - .env
    environment:
      # Git reads global config from $HOME/.gitconfig (Dockerfile sets safe.directory there). Do not point HOME at the mounted repo.
      HOME: /root
      DATABASE_URL: postgresql://ha_user:${POSTGRES_PASSWORD:-ha_dev_password}@postgres:5432/home_automation
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 3000
      ROBOROCK_BRIDGE_URL: http://roborock-bridge:8765
      ROBOROCK_BRIDGE_SECRET: ${ROBOROCK_BRIDGE_SECRET:-change-me-roborock-bridge}
      ZWAVE_JS_URL: ws://zwave-js-ui:3000
      FRONTEND_HOST: frontend
      HA_APP_ROOT: ${HA_APP_ROOT:-/opt/home-automation}
      HA_UPDATE_SCRIPT: ${HA_UPDATE_SCRIPT:-/opt/home-automation/scripts/update.sh}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Non-critical services: backend starts regardless of their state.
      # If they crash or restart-loop, the backend (and the rest of the system)
      # keeps running. Their status is visible in Settings → Docker.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: ${HA_FRONTEND_IMAGE:-ghcr.io/elijah286/ha-frontend:latest}
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.prod
      args:
        INTERNAL_API_ORIGIN: http://backend:3000
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      # Do NOT set NEXT_PUBLIC_API_URL to http://backend:3000 — that hostname only exists
      # inside the Docker network. Browsers must call the API on the same host as the UI
      # (e.g. http://192.168.x.x:3000). The app defaults to http://<page-host>:3000.
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  zwave_data:
